<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recuerdos · Familia Goti</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;800;900&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F3ECD9; --paper-2:#EAE0C4; --card:#FBF8EF; --ink:#12203D; --ink-soft:#4B5768; --ink-faint:#8A8266;
    --rule:#D9CEA9; --stamp:#C1440E; --good:#2C7A45;
    --line-gray:#8A8D90; --line-green:#00933C; --line-brown:#996633; --line-purple:#B933AD; --line-orange:#E35205; --line-red:#D62B1F;
    --shadow: 0 1px 0 rgba(18,32,61,.06), 0 8px 20px -12px rgba(18,32,61,.25);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--paper);
    background-image: radial-gradient(circle at 1px 1px, rgba(18,32,61,.05) 1px, transparent 0);
    background-size:14px 14px;
    color:var(--ink); font-family:'Inter',system-ui,sans-serif; -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:'IBM Plex Mono',monospace;}
  a{color:inherit;}
  .navbar{ position:sticky; top:0; z-index:50; background:rgba(243,236,217,.92); backdrop-filter:blur(6px); border-bottom:1px solid var(--rule); padding:10px 14px; }
  .navbar-inner{max-width:720px;margin:0 auto;display:flex;align-items:center;gap:10px;}
  .navbar-title{font-family:'Archivo',sans-serif;font-weight:800;font-size:14px;white-space:nowrap;text-decoration:none;color:var(--ink);}
  .navbar-title span{color:var(--ink-faint);font-weight:600;}
  .pillrow{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
  .pillrow::-webkit-scrollbar{display:none;}
  .pill{ flex:0 0 auto; font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:11px; padding:5px 9px; border-radius:99px; border:1.5px solid var(--rule); background:var(--card); color:var(--ink-soft); text-decoration:none; white-space:nowrap; }

  .wrap{max-width:720px;margin:0 auto;padding:22px 16px 80px;}
  .hero h1{font-family:'Archivo',sans-serif; font-weight:900; font-size:28px; margin:4px 0 4px; letter-spacing:-.01em;}
  .hero p{color:var(--ink-soft); font-size:14px; margin:0 0 18px;}
  .eyebrow{font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-faint);}

  .who-picker{display:flex; gap:7px; flex-wrap:wrap; margin-bottom:22px;}
  .who-btn{ font-family:'Inter'; font-weight:600; font-size:13px; padding:7px 13px; border-radius:99px; border:1.5px solid var(--rule); background:var(--card); color:var(--ink-soft); cursor:pointer; }
  .who-btn.active{background:var(--ink); color:var(--paper); border-color:var(--ink);}

  .day{ background:var(--card); border-radius:16px; padding:16px; box-shadow:var(--shadow); margin-bottom:18px; border-top:4px solid var(--dot-color, var(--line-gray)); }
  .day-date{ font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--dot-color, var(--ink-soft)); }
  .day h2{ font-family:'Archivo',sans-serif; font-weight:800; font-size:18px; margin:2px 0 8px; }
  .day .story{ font-size:14px; color:var(--ink); margin:0 0 12px; line-height:1.55; }
  .day .pending{ font-size:13px; color:var(--ink-faint); font-style:italic; }

  .grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-bottom:10px; }
  .grid a, .grid .vwrap{ position:relative; display:block; aspect-ratio:1/1; border-radius:8px; overflow:hidden; background:var(--paper-2); }
  .grid img{ width:100%; height:100%; object-fit:cover; display:block; }
  .grid video{ width:100%; height:100%; object-fit:cover; display:block; background:#000; }
  .grid .vbadge{ position:absolute; bottom:4px; right:4px; background:rgba(0,0,0,.55); color:#fff; font-size:9px; padding:1px 5px; border-radius:5px; font-family:'IBM Plex Mono',monospace; pointer-events:none; }

  .upload-row{ display:flex; align-items:center; gap:10px; }
  .upload-btn{
    font-family:'Archivo',sans-serif; font-weight:800; font-size:12.5px; padding:9px 14px; border-radius:10px;
    border:1.5px dashed var(--dot-color, var(--ink-soft)); background:transparent; color:var(--ink-soft); cursor:pointer;
  }
  .upload-status{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-faint); }
  input[type=file]{ display:none; }

  footer{ max-width:720px; margin:0 auto; padding:0 16px 40px; text-align:center; font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-faint); }
</style>
</head>
<body>

<div class="navbar">
  <div class="navbar-inner">
    <a href="/viajes/nueva-york.html" class="navbar-title">← Itinerario <span>· Recuerdos</span></a>
    <div class="pillrow">
      <a class="pill" href="#d1">MAR 7</a>
      <a class="pill" href="#d2">MIÉ 8</a>
      <a class="pill" href="#d3">JUE 9</a>
      <a class="pill" href="#d4">VIE 10</a>
      <a class="pill" href="#d5">SÁB 11</a>
      <a class="pill" href="#d6">DOM 12</a>
      <a class="pill" href="#d7">LUN 13</a>
      <a class="pill" href="#d8">MAR 14</a>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="hero">
    <div class="eyebrow">Familia González Tiscareño</div>
    <h1>Recuerdos del viaje</h1>
    <p>Lo que realmente pasó, día a día — con fotos y videos de todos.</p>
  </div>

  <div class="who-picker" id="who-picker">
    <button class="who-btn" data-who="Manuel">Manuel</button>
    <button class="who-btn" data-who="Gaby">Gaby</button>
    <button class="who-btn" data-who="Sofía">Sofía</button>
    <button class="who-btn" data-who="La Güera">La Güera</button>
  </div>

  <div id="days-mount"></div>
</div>

<footer>goti.mx · las fotos y videos se suben directo desde tu celular</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  const SUPABASE_URL = "https://jgxzbnpbhbrrsedjmnbm.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpneHpibnBiaGJycnNlZGptbmJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMjkzMzksImV4cCI6MjA5NzkwNTMzOX0.PHAVOJYURjM0PP0_Otxa5rn1-Xc-hRhxkB6wWatp4MM";
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const TRIP_KEY = "nyc-2026";

  const DAYS = [
    { id:"d1", date:"Martes 7 jul", color:"var(--line-gray)", title:"Llegada a Nueva York",
      story:`Vuelo MTY → Atlanta → Newark. Aterrizaron ~5:53pm hora pico, car service al hotel, check-in en el San Carlos y cena ligera en Midtown East — directo a descansar del jet lag.` },
    { id:"d2", date:"Miércoles 8 jul", color:"var(--line-orange)", title:"Katz's, SoHo, Friends y LEGO",
      story:`Comida en Katz's antes de que se llenara. Tarde caminando Nolita → SoHo, de shopping (el pedido de la Güera). A las 4pm, The FRIENDS™ Experience en Flatiron. De regreso, parada en el LEGO Store de Rockefeller Center, casi enfrente del hotel. Joe's Pizza se quedó pendiente.` },
    { id:"d3", date:"Jueves 9 jul", color:"var(--line-brown)", title:"11S, Puente de Brooklyn y Chinatown",
      story:`Mañana en el Memorial y Museo del 11S. Después, caminata al Puente de Brooklyn — cruzarlo a pie, vistas del skyline — y de bajada salieron justo en el borde de Chinatown. Recorrieron Chinatown y Little Italy antes de la cena confirmada en Delmonico's, 8pm.` },
    { id:"d4", date:"Viernes 10 jul", color:"var(--line-purple)", title:"Oyster Bar, 5ª Avenida y MJ",
      story:`Comida en el Grand Central Oyster Bar. Caminata por la Quinta Avenida hasta Rockefeller Center, donde se encontraron con el Fan Fest del Mundial. De ahí, descanso en el hotel antes del teatro — Times Square y Ellen's Stardust quedaron fuera del plan. En la noche, MJ The Musical en el Neil Simon Theatre.` },
    { id:"d5", date:"Sábado 11 jul", color:"var(--line-red)", title:"Historia Natural, Central Park y Times Square",
      story:`Mañana en el Museo Americano de Historia Natural, cruzando después Central Park a pie. Comida en Serafina (79th St) — el Guggenheim no se hizo esta vez. En la noche, Times Square otra vez, cena ligera con un corn dog.` },
    { id:"d6", date:"Domingo 12 jul", color:"var(--line-green)", title:"Empire State + noche dividida", pending:true,
      story:`Empire State Building en el CityPASS. En la noche, Manuel y Sofía al concierto de Bon Jovi en el Madison Square Garden; Gaby y Eugenia a Summit One Vanderbilt (Ascent).` },
    { id:"d7", date:"Lunes 13 jul", color:"var(--line-green)", title:"Ferry a Libertad y Ellis Island", pending:true,
      story:`Ferry a la Estatua de la Libertad y Ellis Island. En la noche, Times Square otra vez si les late repetir, y maletas con calma — última noche del viaje.` },
    { id:"d8", date:"Martes 14 jul", color:"var(--line-gray)", title:"Salida", pending:true,
      story:`Taxi al JFK muy temprano. Vuelo AM407 de regreso a Monterrey.` },
  ];

  let whoAmI = localStorage.getItem("nyc-trip-who") || null;
  function setWho(name){
    whoAmI = name;
    localStorage.setItem("nyc-trip-who", name);
    document.querySelectorAll(".who-btn").forEach(b=> b.classList.toggle("active", b.dataset.who === name));
  }
  document.querySelectorAll(".who-btn").forEach(btn=> btn.addEventListener("click", ()=> setWho(btn.dataset.who)));
  if (whoAmI) setWho(whoAmI);

  // ---------- Render días ----------
  const mount = document.getElementById("days-mount");
  DAYS.forEach(day=>{
    const el = document.createElement("div");
    el.className = "day";
    el.id = day.id;
    el.style.setProperty("--dot-color", day.color);
    el.innerHTML = `
      <div class="day-date">${day.date}</div>
      <h2>${day.title}</h2>
      <p class="story">${day.story}</p>
      ${day.pending ? '<p class="pending">Todavía no pasa — cuéntame cómo les fue y lo actualizo.</p>' : ''}
      <div class="grid" id="grid-${day.id}"></div>
      <div class="upload-row">
        <button class="upload-btn" data-day="${day.id}">📷 Agregar foto/video</button>
        <span class="upload-status" id="status-${day.id}"></span>
      </div>
      <input type="file" id="file-${day.id}" accept="image/*,video/*" multiple>
    `;
    mount.appendChild(el);
  });

  // ---------- Upload ----------
  document.querySelectorAll(".upload-btn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      document.getElementById("file-" + btn.dataset.day).click();
    });
  });

  document.querySelectorAll('input[type=file]').forEach(input=>{
    input.addEventListener("change", async (e)=>{
      const dayId = input.id.replace("file-", "");
      const status = document.getElementById("status-" + dayId);
      const files = Array.from(e.target.files);
      if(!files.length) return;
      const author = whoAmI || "alguien";
      let done = 0;
      for(const file of files){
        status.textContent = `Subiendo ${done+1}/${files.length}…`;
        try{
          const ext = file.name.split(".").pop();
          const path = `${dayId}/${Date.now()}-${Math.random().toString(36).slice(2,8)}.${ext}`;
          const { error: upErr } = await sb.storage.from("recuerdos").upload(path, file, {
            contentType: file.type, upsert: false
          });
          if(upErr) throw upErr;
          const { data: urlData } = sb.storage.from("recuerdos").getPublicUrl(path);
          const mediaType = file.type.startsWith("video/") ? "video" : "image";
          await sb.from("trip_memories").insert({
            trip_key: TRIP_KEY, day_key: dayId, media_url: urlData.publicUrl,
            media_type: mediaType, author
          });
          done++;
        }catch(err){
          console.error(err);
          status.textContent = "Error al subir — intenta de nuevo";
          return;
        }
      }
      status.textContent = `✓ ${done} subido(s)`;
      setTimeout(()=> status.textContent = "", 2500);
      input.value = "";
      loadMemories();
    });
  });

  // ---------- Cargar y renderizar ----------
  function renderGrid(dayId, items){
    const grid = document.getElementById("grid-" + dayId);
    if(!grid) return;
    grid.innerHTML = "";
    items.forEach(m=>{
      if(m.media_type === "video"){
        const wrap = document.createElement("div");
        wrap.className = "vwrap";
        wrap.innerHTML = `<video src="${m.media_url}" controls playsinline></video><span class="vbadge">VIDEO</span>`;
        grid.appendChild(wrap);
      } else {
        const a = document.createElement("a");
        a.href = m.media_url; a.target = "_blank";
        a.innerHTML = `<img src="${m.media_url}" loading="lazy">`;
        grid.appendChild(a);
      }
    });
  }

  async function loadMemories(){
    const { data, error } = await sb.from("trip_memories").select("*").eq("trip_key", TRIP_KEY).order("created_at", { ascending:true });
    if(error){ console.error(error); return; }
    const byDay = {};
    data.forEach(m=>{ (byDay[m.day_key] ||= []).push(m); });
    DAYS.forEach(day=> renderGrid(day.id, byDay[day.id] || []));
  }

  sb.channel("memories-live")
    .on("postgres_changes", { event:"*", schema:"public", table:"trip_memories" }, loadMemories)
    .subscribe();

  loadMemories();
</script>
</body>
</html>
