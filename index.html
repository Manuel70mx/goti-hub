<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Familia Goti</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;800;900&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F3ECD9;
    --card:#FBF8EF;
    --ink:#12203D;
    --ink-soft:#4B5768;
    --ink-faint:#8A8266;
    --rule:#D9CEA9;
    --stamp:#C1440E;
    --shadow: 0 1px 0 rgba(18,32,61,.06), 0 8px 20px -12px rgba(18,32,61,.25);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh;
    background:var(--paper);
    background-image: radial-gradient(circle at 1px 1px, rgba(18,32,61,.05) 1px, transparent 0);
    background-size:14px 14px;
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:560px; margin:0 auto; padding:56px 20px 60px;}

  .stamp-row{display:flex; justify-content:center; margin-bottom:22px;}
  .stamp{
    width:64px; height:64px; border-radius:50%;
    border:2px solid var(--stamp); color:var(--stamp);
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    font-family:'IBM Plex Mono',monospace; transform:rotate(-8deg); opacity:.85;
  }
  .stamp .d{font-size:15px; font-weight:700; line-height:1;}
  .stamp .m{font-size:9px; letter-spacing:.1em; text-transform:uppercase; margin-top:2px;}

  h1{
    font-family:'Archivo',sans-serif; font-weight:900; font-size:38px;
    text-align:center; margin:0 0 8px; letter-spacing:-.01em;
  }
  .subtitle{
    text-align:center; color:var(--ink-soft); font-size:14.5px; margin:0 0 40px;
  }

  .cards{display:flex; flex-direction:column; gap:14px;}
  .card{
    position:relative;
    display:flex; align-items:center; gap:14px;
    background:var(--card); border-radius:16px; padding:16px 18px;
    box-shadow:var(--shadow); text-decoration:none; color:var(--ink);
    border:1.5px solid var(--rule); overflow:hidden;
  }
  .card::before{
    content:""; position:absolute; left:0; top:0; bottom:0; width:5px; background:var(--stamp);
  }
  .card .emoji{font-size:26px; flex:0 0 auto;}
  .card .txt{flex:1; min-width:0;}
  .card .title{font-family:'Archivo',sans-serif; font-weight:800; font-size:16.5px; margin-bottom:3px;}
  .card .meta{font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink-soft);}
  .card .arrow{font-size:18px; color:var(--ink-faint); flex:0 0 auto;}

  .empty{
    text-align:center; color:var(--ink-faint); font-size:13.5px; font-style:italic;
    padding:30px 0;
  }

  footer{
    text-align:center; margin-top:50px;
    font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-faint);
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="stamp-row">
    <div class="stamp"><span class="d" id="stamp-day">–</span><span class="m" id="stamp-month">–</span></div>
  </div>

  <h1>Familia Goti</h1>
  <p class="subtitle">Viajes y pendientes, en un solo lugar</p>

  <div class="cards" id="cards-mount">
    <div class="empty">Cargando…</div>
  </div>

</div>

<footer>goti.mx</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  const SUPABASE_URL = "https://jgxzbnpbhbrrsedjmnbm.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpneHpibnBiaGJycnNlZGptbmJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMjkzMzksImV4cCI6MjA5NzkwNTMzOX0.PHAVOJYURjM0PP0_Otxa5rn1-Xc-hRhxkB6wWatp4MM";
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const MESES = ["ENE","FEB","MAR","ABR","MAY","JUN","JUL","AGO","SEP","OCT","NOV","DIC"];
  const today = new Date();
  document.getElementById("stamp-day").textContent = today.getDate();
  document.getElementById("stamp-month").textContent = MESES[today.getMonth()];

  function renderCards(rows){
    const mount = document.getElementById("cards-mount");
    if(!rows.length){
      mount.innerHTML = '<div class="empty">Todavía no hay nada aquí.</div>';
      return;
    }
    mount.innerHTML = "";
    rows.forEach(r=>{
      const a = document.createElement("a");
      a.className = "card";
      a.href = r.href;
      a.innerHTML = `
        <span class="emoji">${r.emoji}</span>
        <span class="txt">
          <span class="title">${r.title}</span><br>
          <span class="meta">${r.subtitle}</span>
        </span>
        <span class="arrow">→</span>`;
      mount.appendChild(a);
    });
  }

  async function loadPages(){
    const { data, error } = await sb.from("family_pages")
      .select("*").eq("active", true).order("sort_order", { ascending:true });
    if(error){ console.error(error); return; }
    renderCards(data);
  }

  sb.channel("family-pages-live")
    .on("postgres_changes", { event:"*", schema:"public", table:"family_pages" }, loadPages)
    .subscribe();

  loadPages();
</script>
</body>
</html>
